<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Massal EBTAQ (Global Page Number)</title>
    
    <style>
        /* ================================================= */
        /* 1. LAYOUT CONTROL PANEL                           */
        /* ================================================= */
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #525659;
            margin: 0; padding: 20px 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .control-panel {
            background-color: #fff; padding: 25px 30px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 25px;
            width: 215mm; box-sizing: border-box;
            border-top: 5px solid #007bff;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* --- HEADER --- */
        .row-header { 
            display: flex; gap: 15px; width: 100%; align-items: flex-end;
            border-bottom: 1px dashed #ddd; padding-bottom: 15px;
        }
        .col-judul { flex: 5; }
        .col-bulan { flex: 2; }
        .col-tahun { flex: 1; min-width: 80px; }

        /* --- GRID UTAMA --- */
        .cp-grid-section { 
            display: flex; gap: 20px; 
            align-items: stretch; 
        }
        .cp-col { 
            flex: 1; display: flex; flex-direction: column; gap: 5px; 
            min-width: 0; 
        }
        
        .cp-col h4 { 
            margin: 0 0 5px 0; font-size: 14px; font-family: Arial, sans-serif; 
            color: #007bff; border-bottom: 2px solid #eee; padding-bottom: 3px; 
            display: flex; justify-content: space-between; align-items: center;
        }

        /* MATERI: GRID 2 KOLOM */
        .checkbox-group-materi {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            max-height: 150px; overflow-y: auto; padding: 8px; 
            border: 1px solid #f0f0f0; background: #fafafa; border-radius: 4px;
        }

        .custom-area {
            margin-top: 5px; padding: 8px; background: #f8f9fa; 
            border: 1px solid #e9ecef; border-radius: 4px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .custom-row { display: flex; gap: 8px; align-items: center; }

        /* SESI: GRID MAX 5 BARIS (SCROLL SAMPING) */
        #container-shift-checkbox {
            flex: 1; 
            border: 1px solid #e0e0e0; background: #fafafa; border-radius: 4px;
            padding: 10px;
            display: grid;
            grid-template-rows: repeat(5, auto); 
            grid-auto-flow: column; 
            gap: 8px 25px; 
            overflow-x: auto; 
            overflow-y: hidden;
        }
        #container-shift-checkbox .cb-item { white-space: nowrap; }

        /* ITEM UMUM */
        .cb-item { display: flex; align-items: center; gap: 5px; font-size: 13px; font-family: Arial, sans-serif; }
        .cb-item input { margin: 0; cursor: pointer; }

        /* INPUT STYLES */
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; font-family: Arial, sans-serif; color: #444; }

        input[type="text"], select {
            padding: 7px 10px; border: 1px solid #ccc; border-radius: 4px;
            font-size: 14px; width: 100%; box-sizing: border-box; font-family: Arial, sans-serif;
        }

        .btn-generate { 
            background-color: #28a745; color: white; border: none; padding: 12px; 
            border-radius: 4px; cursor: pointer; font-weight: bold; font-family: Arial, sans-serif;
            width: 100%; font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.2s;
        }
        .btn-generate:hover { background-color: #218838; transform: translateY(-1px); }

        /* LABEL HALAMAN */
        .page-label {
            display: inline-block; background-color: #333; color: #fff;
            padding: 5px 15px; border-radius: 20px; font-size: 12px;
            font-family: Arial, sans-serif; font-weight: bold;
            margin-top: 15px; margin-bottom: 5px;
        }

        /* ================================================= */
        /* 2. KERTAS F4                                      */
        /* ================================================= */
        .page-container {
            background-color: white; width: 215mm; height: 330mm; 
            margin: 0 auto 0 auto; box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            box-sizing: border-box; 
            padding: 10mm 15mm 15mm 15mm; 
            display: flex; flex-direction: column; position: relative;
        }

        @page { size: 215mm 330mm; margin: 0; }
        @media print {
            body { background: none; padding: 0; display: block; }
            .control-panel, .page-label, #loading, #welcome-msg { display: none !important; }
            .page-container { margin: 0; box-shadow: none; border: none; page-break-after: always; padding: 10mm 15mm 15mm 15mm; }
        }

        /* ================================================= */
        /* 3. DESAIN BLANGKO                                 */
        /* ================================================= */
        .kop-surat { display: flex; align-items: center; justify-content: center; margin-bottom: 2px; position: relative; flex-shrink: 0; }
        .logo-container { position: absolute; left: 0; top: 0; bottom: 0; width: 70px; display: flex; align-items: center; justify-content: flex-start; }
        .logo-container img { width: 100%; height: auto; }
        .kop-text { text-align: center; flex: 1; padding-left: 70px; padding-right: 70px; }
        .kop-t1 { font-size: 12pt; font-weight: bold; letter-spacing: 1px; }
        .kop-t2 { font-size: 22pt; font-weight: 900; margin: 2px 0; }
        .kop-t3 { font-size: 12pt; font-weight: bold; text-transform: uppercase; }
        .kop-alamat { font-size: 9pt; margin-top: 2px; }
        .double-line { border-top: 4px solid #000; border-bottom: 1px solid #000; height: 2px; margin-bottom: 10px; flex-shrink: 0; }

        .judul-blangko { text-align: center; margin-bottom: 10px; flex-shrink: 0; }
        .jb-main { font-size: 14pt; font-weight: bold; text-transform: uppercase; }
        .jb-sub { font-size: 12pt; font-weight: bold; }

        .info-grid { display: flex; justify-content: space-between; font-size: 11pt; font-weight: bold; margin-bottom: 5px; flex-shrink: 0; }
        .info-left, .info-right { width: 48%; }
        .info-row { display: flex; }
        .label { width: 100px; }
        .sep { width: 15px; }
        .val { flex: 1; }

        .split-table-container { display: flex; gap: 10mm; flex: 1; margin-bottom: 5px; }
        .table-column { flex: 1; display: flex; flex-direction: column; }
        
        table { width: 100%; height: 100%; border-collapse: collapse; font-size: 11pt; }
        th { border: 1px solid #000; padding: 5px; background-color: #f0f0f0; font-weight: bold; text-align: center; height: 30px; }
        td { border: 1px solid #000; padding: 0 5px; vertical-align: middle; }
        .col-no { width: 15%; text-align: center; font-weight: bold; }
        .col-nilai { width: 85%; }

        .footer-legal { display: flex; justify-content: flex-end; font-size: 11pt; flex-shrink: 0; }
        .sign-box { width: 250px; text-align: center; }
        .sign-space { height: 12mm; } 
        .sign-name { text-decoration: underline; font-weight: bold; }
        .sign-hint { font-size: 9pt; color: rgba(0,0,0,0.4); font-style: italic; margin-top: 2px; -webkit-print-color-adjust: exact; }
    </style>
</head>
<body>

    <div class="control-panel">
        
        <div class="row-header">
            <div class="col-judul">
                <div class="control-group">
                    <label>Judul Kegiatan</label>
                    <input type="text" id="inp-judul" placeholder="Evaluasi Belajar...">
                </div>
            </div>
            <div class="col-bulan">
                <div class="control-group">
                    <label>Bulan</label>
                    <select id="inp-bulan">
                        <option value="Muharrom">Muharrom</option>
                        <option value="Shofar">Shofar</option>
                        <option value="Rabi'ul Awal">Rabi'ul Awal</option>
                        <option value="Rabi'ul Akhir">Rabi'ul Akhir</option>
                        <option value="Jumadil Awal">Jumadil Awal</option>
                        <option value="Jumadil Akhir">Jumadil Akhir</option>
                        <option value="Rojab" selected>Rojab</option>
                        <option value="Sya'ban">Sya'ban</option>
                        <option value="Ramadhan">Ramadhan</option>
                        <option value="Syawal">Syawal</option>
                        <option value="Dzulqa'dah">Dzulqa'dah</option>
                        <option value="Dzulhijjah">Dzulhijjah</option>
                    </select>
                </div>
            </div>
            <div class="col-tahun">
                <div class="control-group">
                    <label>Tahun</label>
                    <input type="text" id="inp-tahun" style="text-align: center;">
                </div>
            </div>
        </div>

        <div class="cp-grid-section">
            
            <div class="cp-col">
                <h4>1. Pilih Materi</h4>
                <div class="checkbox-group-materi">
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="Fashohah"> Fashohah</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="Tartil"> Tartil</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="Gharib"> Gharib</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="Tajwid"> Tajwid</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="DDH"> DDH</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="SSP"> SSP</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="Sholat"> Sholat</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="Wudhu"> Wudhu</label>
                </div>
                
                <div class="custom-area">
                    <label style="color:#007bff; margin-bottom:0;">Opsi Lainnya:</label>
                    <div class="custom-row">
                        <label class="cb-item" style="color: #d63384;">
                            <input type="checkbox" id="chk-blank-materi"> Kosongkan
                        </label>
                        <input type="text" id="inp-custom-materi" placeholder="Ketik manual..." style="flex:1;">
                    </div>
                </div>
            </div>

            <div class="cp-col">
                <h4>
                    <span>2. Pilih Sesi</span>
                    <label style="margin:0; font-size:11px; cursor: pointer; color:#007bff;">
                        <input type="checkbox" onchange="toggleAllShifts(this)"> Pilih Semua
                    </label>
                </h4>
                <div id="container-shift-checkbox">
                    <div style="padding: 10px; color: #999; font-size: 12px; grid-column: span 1; text-align: center;">Menunggu Data...</div>
                </div>
            </div>
        </div>

        <button class="btn-generate" onclick="generateBatchDocs()">GENERATE DOKUMEN</button>
    </div>

    <div id="loading" style="text-align: center; margin-top: 50px; color: white;"><h3>Sedang Memuat Data...</h3></div>
    <div id="welcome-msg" style="text-align: center; color: white; margin-top: 20px; font-family: Arial;">Siap untuk mencetak!</div>
    <div id="main-output"></div>

    <script>
        const SHEET_ID = '1eIcvIgCLWG3F9jQdsw5XN9llOsK2PoYWKUg1qaQJyyA';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Biodata Cek`; 
        const LOGO_FILENAME = "QIRAATI.png"; 

        let rawData = [];
        let groupedData = {}; 
        let availableShifts = []; 

        async function init() {
            try {
                const h = new Intl.DateTimeFormat('id-ID-u-ca-islamic', { year: 'numeric' }).format(new Date());
                document.getElementById('inp-tahun').value = h.match(/\d+/)[0] + " H";
            } catch(e) {}

            if(localStorage.getItem('ebtaq_judul')) {
                document.getElementById('inp-judul').value = localStorage.getItem('ebtaq_judul');
            } else {
                document.getElementById('inp-judul').value = "Evaluasi Belajar Tahap Akhir Qiroati (EBTAQ)";
            }

            try {
                const res = await fetch(SHEET_URL);
                const txt = await res.text();
                processData(txt);
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                alert("Gagal load data: " + err.message);
            }
        }

        function processData(csvText) {
            const rows = csvText.trim().split('\n').filter(r => r.trim().length > 0);
            const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
            
            rawData = [];
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
                let p = {};
                r.forEach((val, idx) => { p[headers[idx]] = val ? val.trim().replace(/"/g, '') : ''; });
                
                let noStr = p['NOMOR'] || p['Nomor'];
                p['INT_NO'] = noStr ? parseInt(noStr) : i; 
                p['DISP_NO'] = noStr ? String(noStr).padStart(3, '0') : String(i).padStart(3, '0');
                p['GEL'] = (p['Gelombang'] || '-').trim();
                p['SHIFT'] = (p['Shift'] || '-').trim();
                rawData.push(p);
            }

            groupedData = {};
            rawData.forEach(p => {
                const key = `${p['GEL']}-${p['SHIFT']}`;
                if (!groupedData[key]) groupedData[key] = [];
                groupedData[key].push(p);
            });

            availableShifts = Object.keys(groupedData).sort((a, b) => {
                const [g1, s1] = a.split('-').map(Number);
                const [g2, s2] = b.split('-').map(Number);
                if (g1 !== g2) return g1 - g2;
                return s1 - s2;
            });

            renderShiftCheckboxes();
        }

        function renderShiftCheckboxes() {
            const container = document.getElementById('container-shift-checkbox');
            container.innerHTML = '';
            
            availableShifts.forEach(key => {
                const [g, s] = key.split('-');
                const label = `Gel ${g} - Shift ${s}`;
                const count = groupedData[key].length;
                
                const div = document.createElement('label');
                div.className = 'cb-item';
                div.innerHTML = `<input type="checkbox" name="chk-shift" value="${key}"> <span>${label} <b>(${count})</b></span>`;
                container.appendChild(div);
            });
        }

        function toggleAllShifts(source) {
            const cbs = document.getElementsByName('chk-shift');
            for(let cb of cbs) cb.checked = source.checked;
        }

        function generateBatchDocs() {
            const output = document.getElementById('main-output');
            output.innerHTML = '';
            document.getElementById('welcome-msg').style.display = 'none';

            const judul = document.getElementById('inp-judul').value;
            const bulan = document.getElementById('inp-bulan').value;
            const tahun = document.getElementById('inp-tahun').value;
            localStorage.setItem('ebtaq_judul', judul); 

            // 1. KUMPULKAN MATERI
            let materialsToPrint = [];
            const chkMats = document.querySelectorAll('input[name="chk-materi"]:checked');
            chkMats.forEach(cb => materialsToPrint.push(cb.value));
            const customMat = document.getElementById('inp-custom-materi').value.trim();
            if(customMat) materialsToPrint.push(customMat);
            if(document.getElementById('chk-blank-materi').checked) materialsToPrint.push("........................................");

            if(materialsToPrint.length === 0) { alert("Pilih Materi terlebih dahulu!"); return; }

            // 2. KUMPULKAN SHIFT
            const chkShifts = document.querySelectorAll('input[name="chk-shift"]:checked');
            if(chkShifts.length === 0) { alert("Pilih Sesi terlebih dahulu!"); return; }

            // 3. HITUNG TOTAL HALAMAN GLOBAL (Pre-Calculation)
            // Ini untuk memastikan angka "dari Total X" selalu benar, meskipun ada kelas yang > 50 anak.
            let grandTotalPages = 0;
            materialsToPrint.forEach(mat => {
                chkShifts.forEach(shiftCb => {
                    const shiftKey = shiftCb.value;
                    const participants = groupedData[shiftKey];
                    // Hitung butuh berapa halaman untuk shift ini (ceil: pembulatan ke atas)
                    grandTotalPages += Math.ceil(participants.length / 50);
                });
            });

            // 4. GENERATE HALAMAN
            let globalPageCounter = 1; // Counter berjalan

            materialsToPrint.forEach(materiName => {
                chkShifts.forEach(shiftCb => {
                    const shiftKey = shiftCb.value;
                    const participants = groupedData[shiftKey].sort((a,b) => a.INT_NO - b.INT_NO);
                    const [gel, shift] = shiftKey.split('-');

                    const PER_PAGE = 50;
                    const shiftPages = Math.ceil(participants.length / PER_PAGE);

                    for (let i = 0; i < shiftPages; i++) {
                        const chunk = participants.slice(i*PER_PAGE, (i+1)*PER_PAGE);
                        const pageHTML = createPage(chunk, { judul, bulan, tahun, materi: materiName, gel, shift });
                        
                        const lbl = document.createElement('div');
                        lbl.className = 'page-label';
                        
                        // LABEL GLOBAL: Halaman 1 dari 10, 2 dari 10, dst.
                        lbl.innerHTML = `MATERI: <b>${materiName}</b> | GEL ${gel} SHIFT ${shift} | HALAMAN ${globalPageCounter} DARI ${grandTotalPages}`;
                        
                        output.appendChild(lbl);
                        output.appendChild(pageHTML);
                        
                        globalPageCounter++; // Naikkan hitungan
                    }
                });
            });
        }

        function createPage(data, cfg) {
            const div = document.createElement('div');
            div.className = 'page-container';

            const makeRows = (arr, max) => {
                let h = '';
                arr.forEach(p => h += `<tr><td class="col-no">${p.DISP_NO}</td><td class="col-nilai"></td></tr>`);
                for(let k=0; k < (max - arr.length); k++) h += `<tr><td class="col-no">&nbsp;</td><td class="col-nilai"></td></tr>`;
                return h;
            };

            const leftRows = makeRows(data.slice(0, 25), 25);
            const rightRows = makeRows(data.slice(25, 50), 25);

            let sDisp = cfg.shift;
            if(sDisp==='1') sDisp='I (07.00 WIB)';
            if(sDisp==='2') sDisp='II (08.30 WIB)';
            if(sDisp==='3') sDisp='III (10.00 WIB)';

            div.innerHTML = `
                <div class="kop-surat">
                    <div class="logo-container"><img src="${LOGO_FILENAME}" onerror="this.style.display='none'"></div>
                    <div class="kop-text">
                        <div class="kop-t1">KOORDINATOR PENDIDIKAN AL-QUR'AN</div>
                        <div class="kop-t2">METODE QIRAATI</div>
                        <div class="kop-t3">CABANG DEMAK</div>
                        <div class="kop-alamat">Sekretariat : Jl. Sunan Kalijaga 35 Betengan Demak Jawa Tengah Kode Pos. 59511 Telp : 081325264478</div>
                    </div>
                </div>
                <div class="double-line"></div>

                <div class="judul-blangko">
                    <div class="jb-main">BLANGKO REKAPAN PENILAIAN</div>
                    <div class="jb-sub">${cfg.judul}</div>
                </div>

                <div class="info-grid">
                    <div class="info-left">
                        <div class="info-row"><div class="label">Periode</div><div class="sep">:</div><div class="val">${cfg.bulan} ${cfg.tahun}</div></div>
                        <div class="info-row"><div class="label">Materi</div><div class="sep">:</div><div class="val">${cfg.materi}</div></div>
                    </div>
                    <div class="info-right">
                        <div class="info-row"><div class="label">Gelombang</div><div class="sep">:</div><div class="val">${cfg.gel}</div></div>
                        <div class="info-row"><div class="label">Shift</div><div class="sep">:</div><div class="val">${sDisp}</div></div>
                    </div>
                </div>

                <div class="split-table-container">
                    <div class="table-column">
                        <table><thead><tr><th class="col-no">NO</th><th class="col-nilai">NILAI</th></tr></thead><tbody>${leftRows}</tbody></table>
                    </div>
                    <div class="table-column">
                        <table><thead><tr><th class="col-no">NO</th><th class="col-nilai">NILAI</th></tr></thead><tbody>${rightRows}</tbody></table>
                    </div>
                </div>

                <div class="footer-legal">
                    <div class="sign-box">
                        <div class="sign-place">Penguji,</div>
                        <div class="sign-space"></div>
                        <div class="sign-name">_______________________</div>
                        <div class="sign-hint">(tanda tangan dan nama terang)</div>
                    </div>
                </div>
            `;
            return div;
        }

        init();
    </script>
</body>
</html>
