<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blangko Rekap Nilai (Format Demak)</title>
    
    <style>
        /* ================================================= */
        /* 1. LAYOUT UMUM & CONTROL PANEL                    */
        /* ================================================= */
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #525659;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* CONTROL PANEL (Hanya Tampil di Layar) */
        .control-panel {
            background-color: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            width: 215mm;
            box-sizing: border-box;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 12px; font-weight: bold; font-family: Arial, sans-serif; color: #555; }
        .control-group input[type="text"] { padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; width: 200px; }
        .btn-refresh { 
            background-color: #007bff; color: white; border: none; padding: 8px 15px; 
            border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: auto; 
        }
        .btn-refresh:hover { background-color: #0056b3; }

        /* LABEL HALAMAN */
        .page-label {
            display: inline-block;
            background-color: #222;
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 5px;
        }

        /* ================================================= */
        /* 2. KERTAS F4                                      */
        /* ================================================= */
        .page-container {
            background-color: white;
            width: 215mm; 
            height: 330mm; 
            margin: 0 auto 0 auto; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            box-sizing: border-box;
            padding: 10mm 15mm 10mm 15mm; /* Margin Kertas */
            
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ================================================= */
        /* 3. PRINT SETTINGS                                 */
        /* ================================================= */
        @page { size: 215mm 330mm; margin: 0; }

        @media print {
            body { background: none; padding: 0; display: block; }
            .control-panel, .page-label, #loading { display: none !important; }
            .page-container { 
                margin: 0; box-shadow: none; border: none; 
                page-break-after: always; padding: 10mm 15mm 10mm 15mm; 
            }
        }

        /* ================================================= */
        /* 4. DESAIN BLANGKO (SESUAI GAMBAR)                 */
        /* ================================================= */
        
        /* KOP SURAT */
        .kop-surat {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2px;
            position: relative;
        }
        .logo-container {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 70px;
            display: flex; align-items: center; justify-content: flex-start;
        }
        .logo-container img { width: 100%; height: auto; }
        
        .kop-text {
            text-align: center;
            flex: 1;
            padding-left: 70px; /* Kompensasi logo */
            padding-right: 70px;
        }
        .kop-t1 { font-size: 12pt; font-weight: bold; letter-spacing: 1px; }
        .kop-t2 { font-size: 22pt; font-weight: 900; margin: 2px 0; }
        .kop-t3 { font-size: 12pt; font-weight: bold; text-transform: uppercase; }
        .kop-alamat { font-size: 9pt; margin-top: 2px; }

        .double-line {
            border-top: 4px solid #000;
            border-bottom: 1px solid #000;
            height: 2px;
            margin-bottom: 15px;
        }

        /* JUDUL BLANGKO */
        .judul-blangko {
            text-align: center;
            margin-bottom: 15px;
        }
        .jb-main { font-size: 14pt; font-weight: bold; text-transform: uppercase; }
        .jb-sub { font-size: 12pt; font-weight: bold; }

        /* INFO GRID (Periode, Materi, Gel, Shift) */
        .info-grid {
            display: flex;
            justify-content: space-between;
            font-size: 11pt;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .info-left, .info-right { width: 48%; }
        .info-row { display: flex; }
        .label { width: 100px; }
        .sep { width: 15px; }
        .val { flex: 1; }

        /* TABEL 2 KOLOM (SPLIT GRID) */
        .split-table-container {
            display: flex;
            gap: 10mm; /* Jarak antar lajur kiri dan kanan */
            flex: 1; /* Mengisi sisa ruang */
        }
        .table-column { flex: 1; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11pt;
        }
        th {
            border: 1px solid #000;
            padding: 5px;
            background-color: #f0f0f0;
            font-weight: bold;
            text-align: center;
            -webkit-print-color-adjust: exact;
        }
        td {
            border: 1px solid #000;
            padding: 4px 8px; /* Padding baris */
            height: 24px; /* Tinggi baris tetap agar rapi */
            vertical-align: middle;
        }
        .col-no { width: 15%; text-align: center; font-weight: bold; }
        .col-nilai { width: 85%; }

        /* LEGALISASI / TANDA TANGAN */
        .footer-legal {
            margin-top: 10px;
            display: flex;
            justify-content: flex-end;
            font-size: 11pt;
        }
        .sign-box { width: 250px; text-align: center; }
        .sign-space { height: 20mm; }
        .sign-name { text-decoration: underline; font-weight: bold; }

    </style>
</head>
<body>

    <div class="control-panel">
        <div class="control-group">
            <label>Judul Kegiatan (Bisa Diubah)</label>
            <input type="text" id="inp-judul" value="Evaluasi Belajar Tahap Akhir Qiroati (EBTAQ)">
        </div>
        <div class="control-group">
            <label>Periode / Bulan</label>
            <input type="text" id="inp-bulan" value="Rojab 1447">
        </div>
        <div class="control-group">
            <label>Materi / Mapel</label>
            <input type="text" id="inp-materi" value="Fashohah">
        </div>
        <button class="btn-refresh" onclick="refreshData()">Terapkan & Muat Ulang</button>
    </div>

    <div id="loading" style="text-align: center; margin-top: 50px; color: white;">
        <h3>Memproses Data...</h3>
    </div>
    
    <div id="main-output"></div>

    <script>
        const SHEET_ID = '1eIcvIgCLWG3F9jQdsw5XN9llOsK2PoYWKUg1qaQJyyA';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Biodata Cek`; 
        const LOGO_FILENAME = "QIRAATI.png"; 

        // State Global untuk menyimpan input user
        let config = {
            judul: "Evaluasi Belajar Tahap Akhir Qiroati (EBTAQ)",
            bulan: "Rojab 1447",
            materi: "Fashohah"
        };

        // Simpan data mentah agar tidak perlu fetch ulang saat ganti judul
        let rawData = [];

        async function init() {
            // Ambil data dari spreadsheet sekali saja
            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                processRawData(csvText);
                document.getElementById('loading').style.display = 'none';
                renderDocs(); // Render pertama kali
            } catch (error) {
                document.getElementById('loading').innerText = "Gagal memuat data: " + error.message;
            }
        }

        function processRawData(csvText) {
            const rows = csvText.trim().split('\n').filter(r => r.trim().length > 0);
            const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
            
            rawData = [];
            for (let i = 1; i < rows.length; i++) {
                const rowData = rows[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
                let p = {};
                rowData.forEach((val, idx) => { p[headers[idx]] = val ? val.trim().replace(/"/g, '') : ''; });
                
                // Pastikan NOMOR ada dan berupa angka untuk sorting
                // Jika kosong, gunakan index + 1
                let noStr = p['NOMOR'] || p['Nomor'];
                p['INT_NO'] = noStr ? parseInt(noStr) : (i); 
                p['DISP_NO'] = noStr ? String(noStr).padStart(3, '0') : String(i).padStart(3, '0');
                
                // Normalisasi Data Gelombang & Shift
                p['GEL'] = (p['Gelombang'] || '-').trim();
                p['SHIFT'] = (p['Shift'] || '-').trim();

                rawData.push(p);
            }
        }

        function refreshData() {
            // Update config dari input user
            config.judul = document.getElementById('inp-judul').value;
            config.bulan = document.getElementById('inp-bulan').value;
            config.materi = document.getElementById('inp-materi').value;
            
            // Render ulang tanpa fetch
            renderDocs();
        }

        function renderDocs() {
            const output = document.getElementById('main-output');
            output.innerHTML = ''; // Bersihkan output lama

            // 1. GROUPING: Kelompokkan data berdasarkan "GEL-SHIFT"
            //    Contoh Key: "1-1", "1-2", "2-1"
            let groups = {};
            rawData.forEach(p => {
                const key = `${p['GEL']}-${p['SHIFT']}`;
                if (!groups[key]) groups[key] = [];
                groups[key].push(p);
            });

            // 2. SORTING KEYS: Agar urut Gel 1 Shift 1, Gel 1 Shift 2, dst.
            const sortedKeys = Object.keys(groups).sort((a, b) => {
                const [g1, s1] = a.split('-').map(Number);
                const [g2, s2] = b.split('-').map(Number);
                if (g1 !== g2) return g1 - g2;
                return s1 - s2;
            });

            // 3. LOOP PER GROUP (Per Sesi Ujian)
            let globalPageCount = 1;
            
            sortedKeys.forEach(key => {
                // Sort Peserta dalam group ini berdasarkan Nomor
                let participants = groups[key].sort((a, b) => a['INT_NO'] - b['INT_NO']);

                // Pecah per 50 siswa (Kapasitas F4 Split Column)
                const PER_PAGE = 50;
                const totalGroupPages = Math.ceil(participants.length / PER_PAGE);

                for (let i = 0; i < totalGroupPages; i++) {
                    const start = i * PER_PAGE;
                    const end = start + PER_PAGE;
                    const chunk = participants.slice(start, end);
                    
                    // Ambil info Gelombang & Shift dari peserta pertama di chunk ini
                    const currentGel = chunk[0]['GEL'];
                    const currentShift = chunk[0]['SHIFT'];

                    const pageDiv = createPageHTML(chunk, currentGel, currentShift);
                    
                    // Tambahkan Label Halaman (Hanya di layar)
                    const label = document.createElement('div');
                    label.className = 'page-label';
                    label.innerText = `SESI: GEL ${currentGel} SHIFT ${currentShift} | HALAMAN ${i+1} DARI ${totalGroupPages} (Total Urutan: ${globalPageCount})`;
                    
                    output.appendChild(label);
                    output.appendChild(pageDiv);
                    
                    globalPageCount++;
                }
            });
        }

        function getShiftDisplay(shiftCode) {
            // Mapping Angka ke Romawi + Jam sesuai diskusi sebelumnya
            const s = String(shiftCode).trim();
            if (s === '1') return 'I (07.00 WIB)';
            if (s === '2') return 'II (08.30 WIB)';
            if (s === '3') return 'III (10.00 WIB)';
            return s; // Fallback jika format beda
        }

        function createPageHTML(participants, gel, shift) {
            const page = document.createElement('div');
            page.className = 'page-container';

            // Pisahkan 50 data menjadi Kiri (25) dan Kanan (25)
            const leftData = participants.slice(0, 25);
            const rightData = participants.slice(25, 50);

            // Fungsi helper bikin baris tabel
            const createRows = (dataArr, maxRows) => {
                let html = '';
                // Isi data yang ada
                dataArr.forEach(p => {
                    html += `<tr><td class="col-no">${p['DISP_NO']}</td><td class="col-nilai"></td></tr>`;
                });
                // Isi sisa baris kosong agar tabel tetap panjang ke bawah (Estetika)
                const remaining = maxRows - dataArr.length;
                for (let k = 0; k < remaining; k++) {
                    html += `<tr><td class="col-no">&nbsp;</td><td class="col-nilai"></td></tr>`;
                }
                return html;
            };

            const leftRows = createRows(leftData, 25);
            const rightRows = createRows(rightData, 25);

            page.innerHTML = `
                <div class="kop-surat">
                    <div class="logo-container">
                        <img src="${LOGO_FILENAME}" onerror="this.style.display='none'">
                    </div>
                    <div class="kop-text">
                        <div class="kop-t1">KOORDINATOR PENDIDIKAN AL-QUR'AN</div>
                        <div class="kop-t2">METODE QIRAATI</div>
                        <div class="kop-t3">CABANG DEMAK</div>
                        <div class="kop-alamat">Sekretariat : Jl. Sunan Kalijaga 35 Betengan Demak Jawa Tengah Kode Pos. 59511 Telp : 081325264478</div>
                    </div>
                </div>
                <div class="double-line"></div>

                <div class="judul-blangko">
                    <div class="jb-main">BLANGKO REKAPAN PENILAIAN</div>
                    <div class="jb-sub">${config.judul}</div>
                </div>

                <div class="info-grid">
                    <div class="info-left">
                        <div class="info-row">
                            <div class="label">Periode</div><div class="sep">:</div><div class="val">${config.bulan}</div>
                        </div>
                        <div class="info-row">
                            <div class="label">Materi</div><div class="sep">:</div><div class="val">${config.materi}</div>
                        </div>
                    </div>
                    <div class="info-right">
                        <div class="info-row">
                            <div class="label">Gelombang</div><div class="sep">:</div><div class="val">${gel}</div>
                        </div>
                        <div class="info-row">
                            <div class="label">Shift</div><div class="sep">:</div><div class="val">${getShiftDisplay(shift)}</div>
                        </div>
                    </div>
                </div>

                <div class="split-table-container">
                    <div class="table-column">
                        <table>
                            <thead>
                                <tr><th class="col-no">NO</th><th class="col-nilai">NILAI</th></tr>
                            </thead>
                            <tbody>${leftRows}</tbody>
                        </table>
                    </div>
                    
                    <div class="table-column">
                        <table>
                            <thead>
                                <tr><th class="col-no">NO</th><th class="col-nilai">NILAI</th></tr>
                            </thead>
                            <tbody>${rightRows}</tbody>
                        </table>
                    </div>
                </div>

                <div class="footer-legal">
                    <div class="sign-box">
                        <div class="sign-place">Penguji,</div>
                        <div class="sign-space"></div>
                        <div class="sign-name">_______________________</div>
                    </div>
                </div>
            `;
            return page;
        }

        init();
    </script>
</body>
</html>
