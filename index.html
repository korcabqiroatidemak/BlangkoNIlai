<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blangko Rekap Nilai EBTAQ</title>
    
    <style>
        /* ================================================= */
        /* 1. TAMPILAN LAYAR (SCREEN VIEW)                   */
        /* ================================================= */
        body {
            font-family: 'Times New Roman', Times, serif; /* Font resmi */
            background-color: #525659;
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Label Halaman */
        .page-label {
            display: inline-block;
            background-color: #222;
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* CONTAINER KERTAS F4 */
        .page-container {
            background-color: white;
            width: 215mm; 
            height: 330mm; 
            margin: 0 auto 15px auto; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            box-sizing: border-box;
            padding: 15mm 15mm 10mm 15mm; /* Margin dalam kertas */
            
            display: flex;
            flex-direction: column;
            
            page-break-after: always;
            position: relative;
            text-align: left; 
        }

        /* ================================================= */
        /* 2. TAMPILAN CETAK (PRINT VIEW)                    */
        /* ================================================= */
        @page { size: 215mm 330mm; margin: 0; }

        @media print {
            body { background: none; padding: 0; display: block; }
            .page-label { display: none !important; }
            .page-container { margin: 0; box-shadow: none; border: none; page-break-after: always; padding: 15mm 15mm 10mm 15mm; }
            #loading { display: none; }
        }

        /* ================================================= */
        /* 3. DESAIN BLANGKO                                 */
        /* ================================================= */
        
        /* --- HEADER --- */
        .header {
            display: flex;
            align-items: center;
            border-bottom: 3px double #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .logo-box { width: 60px; height: 60px; margin-right: 15px; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .title-box {
            flex: 1;
            text-align: center;
        }
        .title-main { font-size: 16pt; font-weight: bold; text-transform: uppercase; line-height: 1.2; }
        .title-sub { font-size: 14pt; font-weight: bold; margin-top: 5px; }

        /* --- TABEL --- */
        .table-area { flex: 1; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12pt;
        }
        th {
            border: 1px solid #000;
            padding: 8px;
            background-color: #eee;
            font-weight: bold;
            text-align: center;
            -webkit-print-color-adjust: exact;
        }
        td {
            border: 1px solid #000;
            padding: 5px 10px;
            vertical-align: middle;
            height: 25px; /* Tinggi baris minimal agar nyaman ditulis */
        }
        .col-no { width: 30%; text-align: center; font-weight: bold; }
        .col-nilai { width: 70%; }

        /* --- FOOTER (LEGALISASI) --- */
        .footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end; /* Rata kanan */
        }
        .sign-box {
            width: 80mm; /* Area tanda tangan */
            text-align: center;
            font-size: 12pt;
        }
        .sign-date { margin-bottom: 20px; }
        .sign-space { height: 25mm; } /* Ruang tanda tangan */
        .sign-name { 
            font-weight: bold; 
            text-decoration: underline; 
            margin-bottom: 5px;
        }
        .sign-role { font-style: italic; }

    </style>
</head>
<body>

    <div id="loading" style="text-align: center; margin-top: 50px; color: white;">
        <h3>Memproses Blangko...</h3>
    </div>
    <div id="main-output"></div>

    <script>
        const SHEET_ID = '1eIcvIgCLWG3F9jQdsw5XN9llOsK2PoYWKUg1qaQJyyA';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Biodata Cek`; 
        const LOGO_FILENAME = "QIRAATI.png"; 

        const mainOutput = document.getElementById('main-output');
        const loading = document.getElementById('loading');

        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error("Gagal ambil data");
                const csvText = await response.text();
                loading.style.display = 'none';
                processCSV(csvText);
            } catch (error) {
                loading.innerText = 'Error: ' + error.message;
            }
        }

        function processCSV(csvText) {
            const rows = csvText.trim().split('\n').filter(r => r.trim().length > 0);
            const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
            
            let allParticipants = [];
            for (let i = 1; i < rows.length; i++) {
                const rowData = rows[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
                let p = {};
                rowData.forEach((val, idx) => { p[headers[idx]] = val ? val.trim().replace(/"/g, '') : ''; });
                
                // Pastikan NOMOR ada untuk keperluan sorting
                p['NOMOR'] = p['NOMOR'] || p['Nomor'] || (i); 
                allParticipants.push(p);
            }

            // SORTING: Urutkan berdasarkan kolom NOMOR (001, 002, dst)
            allParticipants.sort((a, b) => {
                return parseInt(a['NOMOR']) - parseInt(b['NOMOR']);
            });

            // KONFIGURASI HALAMAN
            const ROWS_PER_PAGE = 25; // Jumlah siswa per halaman agar muat F4
            const totalPages = Math.ceil(allParticipants.length / ROWS_PER_PAGE);
            
            for (let i = 0; i < totalPages; i++) {
                const start = i * ROWS_PER_PAGE;
                const end = start + ROWS_PER_PAGE;
                const chunk = allParticipants.slice(start, end);
                
                // Buat Halaman
                const pageDiv = createPageHTML(chunk);
                appendPageWithLabel(pageDiv, i + 1, totalPages);
            }
        }

        function appendPageWithLabel(container, current, total) {
            const label = document.createElement('div');
            label.className = 'page-label';
            label.innerText = `HALAMAN ${current} DARI ${total}`;
            mainOutput.appendChild(label);
            mainOutput.appendChild(container);
        }

        function createPageHTML(participants) {
            const page = document.createElement('div');
            page.className = 'page-container';

            // Generate Baris Tabel
            let tableRows = '';
            participants.forEach(p => {
                const nomor = String(p['NOMOR']).padStart(3, '0');
                // Kolom Nilai Dibiarkan Kosong
                tableRows += `
                    <tr>
                        <td class="col-no">${nomor}</td>
                        <td class="col-nilai"></td>
                    </tr>
                `;
            });

            // Isi Halaman jika baris kurang dari batas (opsional, agar tabel tetap panjang ke bawah)
            // Uncomment di bawah jika ingin tabel selalu penuh sampai bawah walau data sedikit
            /*
            const remaining = 25 - participants.length;
            for(let k=0; k<remaining; k++) {
                 tableRows += `<tr><td class="col-no">&nbsp;</td><td class="col-nilai"></td></tr>`;
            }
            */

            page.innerHTML = `
                <div class="header">
                    <div class="logo-box">
                        <img src="${LOGO_FILENAME}" onerror="this.style.display='none'">
                    </div>
                    <div class="title-box">
                        <div class="title-main">BLANGKO PENILAIAN EBTAQ<br>KORCAB DEMAK</div>
                        <div class="title-sub">ROJAB 1447 H.</div>
                    </div>
                </div>

                <div class="table-area">
                    <table>
                        <thead>
                            <tr>
                                <th class="col-no">NOMOR PESERTA</th>
                                <th class="col-nilai">NILAI</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                </div>

                <div class="footer">
                    <div class="sign-box">
                        <div class="sign-date">Demak, ...........................................</div>
                        <div class="sign-title">Penguji,</div>
                        <div class="sign-space"></div>
                        <div class="sign-name">______________________________</div>
                        <div class="sign-role">Mata Ujian: ...................................</div>
                    </div>
                </div>
            `;
            return page;
        }

        fetchSheetData();
    </script>
</body>
</html>
