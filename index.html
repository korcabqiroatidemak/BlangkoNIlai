<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Massal EBTAQ (Multi-Select)</title>
    
    <style>
        /* ================================================= */
        /* 1. LAYOUT UMUM                                    */
        /* ================================================= */
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #525659;
            margin: 0; padding: 20px 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* CONTROL PANEL YANG LEBIH LUAS */
        .control-panel {
            background-color: #fff; padding: 25px 30px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 25px;
            width: 215mm; box-sizing: border-box;
            border-top: 5px solid #007bff;
            display: flex; flex-direction: column; gap: 15px; /* Stack vertikal per blok */
        }

        /* ROW UNTUK INPUT UMUM (Judul, Bulan, Tahun) */
        .cp-row {
            display: flex; flex-wrap: wrap; gap: 15px; border-bottom: 1px dashed #ccc; padding-bottom: 15px;
        }
        
        /* GRID UNTUK CHECKBOXES */
        .cp-grid-section { display: flex; gap: 20px; }
        .cp-col { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .cp-col h4 { margin: 0 0 5px 0; font-size: 14px; font-family: Arial, sans-serif; color: #007bff; border-bottom: 2px solid #eee; padding-bottom: 3px; }

        .checkbox-group {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            max-height: 150px; overflow-y: auto; padding: 5px; border: 1px solid #f0f0f0; background: #fafafa;
        }
        .cb-item { display: flex; align-items: center; gap: 5px; font-size: 13px; font-family: Arial, sans-serif; }
        .cb-item input { margin: 0; cursor: pointer; }

        /* INPUT FIELD STYLES */
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 12px; font-weight: bold; font-family: Arial, sans-serif; color: #444; }
        .w-full { flex: 0 0 100%; } 
        .w-auto { flex: 1; }
        .w-small { flex: 0 0 100px; }

        input[type="text"], select {
            padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px;
            font-size: 14px; width: 100%; box-sizing: border-box; font-family: Arial, sans-serif;
        }

        .btn-refresh { 
            background-color: #007bff; color: white; border: none; padding: 12px; 
            border-radius: 4px; cursor: pointer; font-weight: bold; font-family: Arial, sans-serif;
            width: 100%; margin-top: 10px; font-size: 14px;
            transition: all 0.2s;
        }
        .btn-refresh:hover { background-color: #0056b3; }

        /* LABEL HALAMAN */
        .page-label {
            display: inline-block; background-color: #222; color: #fff;
            padding: 4px 12px; border-radius: 4px; font-size: 13px;
            font-family: Arial, sans-serif; font-weight: bold;
            margin-top: 10px; margin-bottom: 5px;
        }

        /* ================================================= */
        /* 2. KERTAS F4 (MARGIN BAWAH 1.5 CM)                */
        /* ================================================= */
        .page-container {
            background-color: white; width: 215mm; height: 330mm; 
            margin: 0 auto 0 auto; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            box-sizing: border-box; 
            
            /* MARGIN: Atas 10mm, Kanan 15mm, BAWAH 15mm, Kiri 15mm */
            padding: 10mm 15mm 15mm 15mm; 
            
            display: flex; flex-direction: column; position: relative;
        }

        @page { size: 215mm 330mm; margin: 0; }
        @media print {
            body { background: none; padding: 0; display: block; }
            .control-panel, .page-label, #loading, #welcome-msg { display: none !important; }
            .page-container { margin: 0; box-shadow: none; border: none; page-break-after: always; padding: 10mm 15mm 15mm 15mm; }
        }

        /* ================================================= */
        /* 3. DESAIN BLANGKO                                 */
        /* ================================================= */
        .kop-surat { display: flex; align-items: center; justify-content: center; margin-bottom: 2px; position: relative; }
        .logo-container { position: absolute; left: 0; top: 0; bottom: 0; width: 70px; display: flex; align-items: center; justify-content: flex-start; }
        .logo-container img { width: 100%; height: auto; }
        .kop-text { text-align: center; flex: 1; padding-left: 70px; padding-right: 70px; }
        .kop-t1 { font-size: 12pt; font-weight: bold; letter-spacing: 1px; }
        .kop-t2 { font-size: 22pt; font-weight: 900; margin: 2px 0; }
        .kop-t3 { font-size: 12pt; font-weight: bold; text-transform: uppercase; }
        .kop-alamat { font-size: 9pt; margin-top: 2px; }
        .double-line { border-top: 4px solid #000; border-bottom: 1px solid #000; height: 2px; margin-bottom: 10px; }

        .judul-blangko { text-align: center; margin-bottom: 10px; }
        .jb-main { font-size: 14pt; font-weight: bold; text-transform: uppercase; }
        .jb-sub { font-size: 12pt; font-weight: bold; }

        .info-grid { display: flex; justify-content: space-between; font-size: 11pt; font-weight: bold; margin-bottom: 5px; }
        .info-left, .info-right { width: 48%; }
        .info-row { display: flex; }
        .label { width: 100px; }
        .sep { width: 15px; }
        .val { flex: 1; }

        .split-table-container { display: flex; gap: 10mm; flex: 1; }
        .table-column { flex: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 11pt; }
        th { border: 1px solid #000; padding: 4px; background-color: #f0f0f0; font-weight: bold; text-align: center; -webkit-print-color-adjust: exact; }
        
        /* Baris Tabel Sedikit Dipadatkan agar muat 50 baris dengan margin 1.5cm */
        td { border: 1px solid #000; padding: 2px 5px; height: 23px; vertical-align: middle; }
        
        .col-no { width: 15%; text-align: center; font-weight: bold; }
        .col-nilai { width: 85%; }

        /* FOOTER & TANDA TANGAN (COMPACT) */
        .footer-legal { margin-top: 5px; display: flex; justify-content: flex-end; font-size: 11pt; }
        .sign-box { width: 250px; text-align: center; }
        
        /* Area Tanda Tangan Dikurangi agar muat */
        .sign-space { height: 15mm; } 
        
        .sign-name { text-decoration: underline; font-weight: bold; }
        
        /* Placeholder Transparan */
        .sign-hint {
            font-size: 9pt; color: rgba(0,0,0,0.4); font-style: italic; margin-top: 2px;
            -webkit-print-color-adjust: exact;
        }

    </style>
</head>
<body>

    <div class="control-panel">
        <div class="cp-row">
            <div class="control-group w-full">
                <label>Judul Kegiatan</label>
                <input type="text" id="inp-judul" placeholder="Judul Kegiatan...">
            </div>
            <div class="control-group w-auto">
                <label>Bulan</label>
                <select id="inp-bulan">
                    <option value="Rojab" selected>Rojab</option>
                    <option value="Muharrom">Muharrom</option>
                    <option value="Sya'ban">Sya'ban</option>
                    </select>
            </div>
            <div class="control-group w-small">
                <label>Tahun</label>
                <input type="text" id="inp-tahun" placeholder="14xx H">
            </div>
        </div>

        <div class="cp-grid-section">
            
            <div class="cp-col">
                <h4>1. Pilih Materi (Bisa Banyak)</h4>
                <div class="checkbox-group">
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="Fashohah"> Fashohah</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="Tartil"> Tartil</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="Gharib"> Gharib</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="Tajwid"> Tajwid</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="DDH"> DDH</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="SSP"> SSP</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="Sholat"> Sholat</label>
                    <label class="cb-item"><input type="checkbox" name="chk-materi" value="Wudhu"> Wudhu</label>
                </div>
                
                <div style="margin-top: 5px; background: #eee; padding: 5px; border-radius: 4px;">
                    <label class="cb-item" style="font-weight: bold; color: #d63384;">
                        <input type="checkbox" id="chk-blank-materi"> Kosongkan Materi (Manual)
                    </label>
                    <div style="margin-top: 5px; display: flex; align-items: center; gap: 5px;">
                        <span style="font-size: 11px;">Atau Custom:</span>
                        <input type="text" id="inp-custom-materi" placeholder="Ketik materi baru..." style="font-size: 12px; padding: 4px;">
                    </div>
                </div>
            </div>

            <div class="cp-col">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h4>2. Pilih Sesi (Deteksi Otomatis)</h4>
                    <label style="font-size: 11px; cursor: pointer; color: blue;">
                        <input type="checkbox" onchange="toggleAllShifts(this)"> Pilih Semua
                    </label>
                </div>
                <div class="checkbox-group" id="container-shift-checkbox">
                    <div style="padding: 10px; color: #999; font-size: 12px;">Menunggu Data...</div>
                </div>
            </div>
        </div>

        <button class="btn-refresh" onclick="generateBatchDocs()">GENERATE DOKUMEN (BATCH)</button>
    </div>

    <div id="loading" style="text-align: center; margin-top: 50px; color: white;"><h3>Memuat Data...</h3></div>
    <div id="welcome-msg" style="text-align: center; color: white; margin-top: 20px;">Silakan pilih Materi dan Sesi, lalu klik Generate.</div>
    <div id="main-output"></div>

    <script>
        const SHEET_ID = '1eIcvIgCLWG3F9jQdsw5XN9llOsK2PoYWKUg1qaQJyyA';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Biodata Cek`; 
        const LOGO_FILENAME = "QIRAATI.png"; 

        let rawData = [];
        let groupedData = {}; // Menyimpan data yang sudah dikelompokkan per Shift
        let availableShifts = []; // List key shift yang tersedia

        // === 1. INIT & DATA LOADING ===
        async function init() {
            // Smart Default Tahun
            try {
                const h = new Intl.DateTimeFormat('id-ID-u-ca-islamic', { year: 'numeric' }).format(new Date());
                document.getElementById('inp-tahun').value = h.match(/\d+/)[0] + " H";
            } catch(e) {}

            // Load Judul dari Memory
            if(localStorage.getItem('ebtaq_judul')) {
                document.getElementById('inp-judul').value = localStorage.getItem('ebtaq_judul');
            } else {
                document.getElementById('inp-judul').value = "Evaluasi Belajar Tahap Akhir Qiroati (EBTAQ)";
            }

            // Fetch Data
            try {
                const res = await fetch(SHEET_URL);
                const txt = await res.text();
                processData(txt);
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                alert("Gagal load data: " + err.message);
            }
        }

        function processData(csvText) {
            const rows = csvText.trim().split('\n').filter(r => r.trim().length > 0);
            const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
            
            rawData = [];
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
                let p = {};
                r.forEach((val, idx) => { p[headers[idx]] = val ? val.trim().replace(/"/g, '') : ''; });
                
                // Normalisasi
                let noStr = p['NOMOR'] || p['Nomor'];
                p['INT_NO'] = noStr ? parseInt(noStr) : i; 
                p['DISP_NO'] = noStr ? String(noStr).padStart(3, '0') : String(i).padStart(3, '0');
                p['GEL'] = (p['Gelombang'] || '-').trim();
                p['SHIFT'] = (p['Shift'] || '-').trim();
                rawData.push(p);
            }

            // Grouping untuk Checkbox Shift
            groupedData = {};
            rawData.forEach(p => {
                const key = `${p['GEL']}-${p['SHIFT']}`;
                if (!groupedData[key]) groupedData[key] = [];
                groupedData[key].push(p);
            });

            // Urutkan Key (Gel 1 Shift 1, dst)
            availableShifts = Object.keys(groupedData).sort((a, b) => {
                const [g1, s1] = a.split('-').map(Number);
                const [g2, s2] = b.split('-').map(Number);
                if (g1 !== g2) return g1 - g2;
                return s1 - s2;
            });

            renderShiftCheckboxes();
        }

        function renderShiftCheckboxes() {
            const container = document.getElementById('container-shift-checkbox');
            container.innerHTML = '';
            
            availableShifts.forEach(key => {
                const [g, s] = key.split('-');
                const label = `Gel ${g} - Shift ${s}`;
                const count = groupedData[key].length;
                
                const div = document.createElement('label');
                div.className = 'cb-item';
                div.innerHTML = `<input type="checkbox" name="chk-shift" value="${key}"> ${label} <b>(${count})</b>`;
                container.appendChild(div);
            });
        }

        function toggleAllShifts(source) {
            const cbs = document.getElementsByName('chk-shift');
            for(let cb of cbs) cb.checked = source.checked;
        }

        // === 2. GENERATE LOGIC (BATCH) ===
        function generateBatchDocs() {
            const output = document.getElementById('main-output');
            output.innerHTML = '';
            document.getElementById('welcome-msg').style.display = 'none';

            // Ambil Input Header
            const judul = document.getElementById('inp-judul').value;
            const bulan = document.getElementById('inp-bulan').value;
            const tahun = document.getElementById('inp-tahun').value;
            localStorage.setItem('ebtaq_judul', judul); // Simpan judul saja

            // 1. Tentukan Daftar Materi yang Dipilih
            let materialsToPrint = [];
            
            // Cek Custom
            const customMat = document.getElementById('inp-custom-materi').value.trim();
            if(customMat) materialsToPrint.push(customMat);

            // Cek Blank
            if(document.getElementById('chk-blank-materi').checked) {
                materialsToPrint.push("........................................"); // Placeholder kosong
            }

            // Cek Checkbox Standar (Jika Custom & Blank kosong, baru cek ini. Atau bisa gabung)
            // Logic: Kita gabung saja semua yang dicentang
            const chkMats = document.querySelectorAll('input[name="chk-materi"]:checked');
            chkMats.forEach(cb => materialsToPrint.push(cb.value));

            // Validasi Materi
            if(materialsToPrint.length === 0) {
                alert("Pilih setidaknya satu materi, atau centang 'Kosongkan', atau isi Custom.");
                return;
            }

            // 2. Tentukan Shift yang Dipilih
            const chkShifts = document.querySelectorAll('input[name="chk-shift"]:checked');
            if(chkShifts.length === 0) {
                alert("Pilih setidaknya satu Sesi (Gelombang/Shift).");
                return;
            }

            // 3. LOOPING UTAMA (MATERI -> SHIFT -> HALAMAN)
            let globalPageCount = 1;

            materialsToPrint.forEach(materiName => {
                chkShifts.forEach(shiftCb => {
                    const shiftKey = shiftCb.value;
                    const participants = groupedData[shiftKey].sort((a,b) => a.INT_NO - b.INT_NO);
                    const [gel, shift] = shiftKey.split('-');

                    // Render Pages for this group
                    const PER_PAGE = 50;
                    const totalPages = Math.ceil(participants.length / PER_PAGE);

                    for (let i = 0; i < totalPages; i++) {
                        const chunk = participants.slice(i*PER_PAGE, (i+1)*PER_PAGE);
                        
                        const pageHTML = createPage(chunk, {
                            judul, bulan, tahun, materi: materiName,
                            gel, shift
                        });

                        // Label
                        const lbl = document.createElement('div');
                        lbl.className = 'page-label';
                        lbl.innerHTML = `MATERI: <b>${materiName}</b> | GEL ${gel} SHIFT ${shift} | HAL ${i+1}/${totalPages}`;
                        
                        output.appendChild(lbl);
                        output.appendChild(pageHTML);
                    }
                });
            });
        }

        function createPage(data, cfg) {
            const div = document.createElement('div');
            div.className = 'page-container';

            // Helper Rows
            const makeRows = (arr, max) => {
                let h = '';
                arr.forEach(p => h += `<tr><td class="col-no">${p.DISP_NO}</td><td class="col-nilai"></td></tr>`);
                for(let k=0; k < (max - arr.length); k++) h += `<tr><td class="col-no">&nbsp;</td><td class="col-nilai"></td></tr>`;
                return h;
            };

            const leftRows = makeRows(data.slice(0, 25), 25);
            const rightRows = makeRows(data.slice(25, 50), 25);

            // Shift Display
            let sDisp = cfg.shift;
            if(sDisp==='1') sDisp='I (07.00 WIB)';
            if(sDisp==='2') sDisp='II (08.30 WIB)';
            if(sDisp==='3') sDisp='III (10.00 WIB)';

            div.innerHTML = `
                <div class="kop-surat">
                    <div class="logo-container"><img src="${LOGO_FILENAME}" onerror="this.style.display='none'"></div>
                    <div class="kop-text">
                        <div class="kop-t1">KOORDINATOR PENDIDIKAN AL-QUR'AN</div>
                        <div class="kop-t2">METODE QIRAATI</div>
                        <div class="kop-t3">CABANG DEMAK</div>
                        <div class="kop-alamat">Sekretariat : Jl. Sunan Kalijaga 35 Betengan Demak Jawa Tengah Kode Pos. 59511 Telp : 081325264478</div>
                    </div>
                </div>
                <div class="double-line"></div>

                <div class="judul-blangko">
                    <div class="jb-main">BLANGKO REKAPAN PENILAIAN</div>
                    <div class="jb-sub">${cfg.judul}</div>
                </div>

                <div class="info-grid">
                    <div class="info-left">
                        <div class="info-row"><div class="label">Periode</div><div class="sep">:</div><div class="val">${cfg.bulan} ${cfg.tahun}</div></div>
                        <div class="info-row"><div class="label">Materi</div><div class="sep">:</div><div class="val">${cfg.materi}</div></div>
                    </div>
                    <div class="info-right">
                        <div class="info-row"><div class="label">Gelombang</div><div class="sep">:</div><div class="val">${cfg.gel}</div></div>
                        <div class="info-row"><div class="label">Shift</div><div class="sep">:</div><div class="val">${sDisp}</div></div>
                    </div>
                </div>

                <div class="split-table-container">
                    <div class="table-column">
                        <table><thead><tr><th class="col-no">NO</th><th class="col-nilai">NILAI</th></tr></thead><tbody>${leftRows}</tbody></table>
                    </div>
                    <div class="table-column">
                        <table><thead><tr><th class="col-no">NO</th><th class="col-nilai">NILAI</th></tr></thead><tbody>${rightRows}</tbody></table>
                    </div>
                </div>

                <div class="footer-legal">
                    <div class="sign-box">
                        <div class="sign-place">Penguji,</div>
                        <div class="sign-space"></div>
                        <div class="sign-name">_______________________</div>
                        <div class="sign-hint">(tanda tangan dan nama terang)</div>
                    </div>
                </div>
            `;
            return div;
        }

        init();
    </script>
</body>
</html>
